<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komuta Merkezi | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; opacity: 0.5; }
        .tab-btn.active { border-color: #ef4444; color: #ef4444; opacity: 1; background: rgba(239, 68, 68, 0.05); }
        .penalty-btn { font-size: 10px; font-weight: 800; width: 38px; height: 30px; border-radius: 8px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .mic-active { background: #ef4444 !important; animation: pulse-mic 1.5s infinite; border-color: #ef4444 !important; color: white !important; }
        .spk-active { background: #3b82f6 !important; border-color: #3b82f6 !important; color: white !important; }
        @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9b1c31; border-radius: 10px; }
        .team-code-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; padding: 0.25rem 0.5rem; width: 100px; text-align: center; font-family: monospace; font-weight: bold; color: #ef4444; text-transform: uppercase; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8 text-center">
    <div id="toastArea" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-xs space-y-2 text-left"></div>
    <div id="audioPlayers" class="hidden"></div>

    <div id="teamModal" class="fixed inset-0 z-[600] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity duration-300">
        <div class="glass w-full max-w-3xl rounded-[2.5rem] p-8 md:p-12 relative border-t-4 border-red-700 text-white shadow-3xl text-left">
            <button onclick="closeModal()" class="absolute top-8 right-8 p-3 glass rounded-full hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            <div id="modalBody" class="max-h-[85vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row justify-between items-center glass p-6 rounded-3xl gap-4">
            <div class="flex items-center gap-4 text-left">
                <div class="p-4 bg-red-700 rounded-2xl shadow-xl shadow-red-900/20"><i data-lucide="shield-check" class="text-white"></i></div>
                <div><h1 class="text-2xl font-black uppercase leading-none">SDÜ <span class="text-red-600">KOMUTA</span></h1><p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-1" id="connStatusText">HAT BAŞLATILIYOR...</p></div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="manualVoiceReset()" class="p-3 glass rounded-xl text-slate-400 hover:text-emerald-500 transition-colors" title="Ses Sistemini Resetle"><i data-lucide="refresh-cw" id="voiceResetIcon"></i></button>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/5"><button onclick="switchTab('teams')" id="btnTabTeams" class="tab-btn active px-8 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest">Yarışmacılar</button><button onclick="switchTab('refs')" id="btnTabRefs" class="tab-btn px-8 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest">Hakemler</button></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-red-600 relative overflow-hidden text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Yarışmacı Genel Hattı</p>
                <div class="flex gap-4">
                    <button id="tmSpk" onclick="toggleTSpk()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x" class="w-5 h-5"></i>DUY</button>
                    <button id="tmMic" onclick="toggleTMic()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off" class="w-5 h-5"></i>ANONS</button>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] border-l-4 border-emerald-600 relative overflow-hidden text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Hakem Genel Hattı</p>
                <div class="flex gap-4">
                    <button id="rfSpk" onclick="toggleRSpk()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x" class="w-5 h-5"></i>DUY</button>
                    <button id="rfMic" onclick="toggleRMic()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off" class="w-5 h-5"></i>ANONS</button>
                </div>
            </div>
        </div>

        <div id="panelTeams" class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left text-white border-collapse">
                <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400">
                    <tr><th class="px-8 py-6">Takım ve Kod</th><th class="px-8 py-6 text-center">Süre Kontrol</th><th class="px-8 py-6 text-center">Ceza / Bonus</th><th class="px-8 py-6 text-center">Özel Telsiz</th><th class="px-8 py-6 text-right">Canlı İzle</th></tr>
                </thead>
                <tbody id="teamsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <div id="panelRefs" class="hidden space-y-4">
            <div class="glass p-8 rounded-[2rem] flex flex-wrap items-center justify-between gap-6 border border-white/5 text-left">
                <div class="flex gap-4 flex-1 min-w-[300px]">
                    <div class="flex-1 space-y-2 text-left"><label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Hakem Adı</label><input type="text" id="newRefName" placeholder="Örn: Nokta 1 Hakemi" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white"></div>
                    <div class="w-40 space-y-2 text-left"><label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Giriş Kodu</label><input type="text" id="newRefCode" placeholder="HAKEM01" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white uppercase font-mono"></div>
                </div>
                <button onclick="addReferee()" class="mt-6 px-10 py-3.5 bg-emerald-600 text-white rounded-xl text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-emerald-500 active:scale-95 transition-all">Hakem Kaydet</button>
            </div>
            <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
                <table class="w-full text-left text-white border-collapse">
                    <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400 text-center">
                        <tr><th class="px-8 py-6 text-left">Görevli Hakem</th><th class="px-8 py-6">Giriş Kodu</th><th class="px-8 py-6 text-center">Özel Telsiz</th><th class="px-8 py-6 text-right">Konum</th><th class="px-8 py-6">İşlem</th></tr>
                    </thead>
                    <tbody id="refsBody" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let teamsData = [], refsData = [], reportsData = [], peer = null, myStream = null;
        let activeCalls = {}, privateMicId = null, privateSpkId = null;
        let tmSpk = false, tmMic = false, rfSpk = false, rfMic = false;
        let isInitializing = false;

        async function fetchData() {
            const { data: t } = await supabaseClient.from('registrations').select('*').order('team_name');
            const { data: r } = await supabaseClient.from('referees').select('*').order('name');
            const { data: rp } = await supabaseClient.from('referee_reports').select('*, referees(name)');
            teamsData = t || []; refsData = r || []; reportsData = rp || []; render();
        }

        function switchTab(t) {
            document.getElementById('panelTeams').classList.toggle('hidden', t !== 'teams');
            document.getElementById('panelRefs').classList.toggle('hidden', t !== 'refs');
            document.getElementById('btnTabTeams').classList.toggle('active', t === 'teams');
            document.getElementById('btnTabRefs').classList.toggle('active', t === 'refs');
        }

        function render() {
            document.getElementById('teamsBody').innerHTML = teamsData.map(t => {
                const pid = 'SDU_TEAM_' + t.id.substring(0,8);
                return `<tr class="hover:bg-white/5 transition-colors"><td class="px-8 py-6 text-left"><button onclick="openTeamModal('${t.id}')" class="font-black uppercase text-white hover:text-red-500 transition-colors">${t.team_name}</button><div class="mt-2 flex items-center gap-2"><span class="text-[9px] text-slate-500 font-bold uppercase">KOD:</span><input type="text" class="team-code-input text-[11px]" value="${t.team_code||''}" onchange="updateTeamCode('${t.id}',this.value)"></div></td><td class="px-8 py-6 text-center"><div class="flex items-center justify-center gap-3"><button onclick="timerCtrl('${t.id}','${t.is_timer_running?'stop':'start'}')" class="p-2.5 rounded-xl ${t.is_timer_running?'bg-red-500/20 text-red-500':'bg-emerald-500/20 text-emerald-500'} transition-all"><i data-lucide="${t.is_timer_running?'pause':'play'}" class="w-5 h-5"></i></button><button onclick="timerCtrl('${t.id}','reset')" class="p-2.5 rounded-xl bg-slate-800 text-slate-500 hover:text-white transition-all"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button><span class="text-sm font-black mono w-20 text-center" id="timer-${t.id}">${formatTime(t)}</span></div></td><td class="px-8 py-6 text-center"><div class="flex gap-1.5 justify-center"><button onclick="applyPenalty('${t.id}',5)" class="penalty-btn bg-orange-500/10 text-orange-500">+5</button><button onclick="applyPenalty('${t.id}',25)" class="penalty-btn bg-orange-500/20 text-orange-500 font-black">+25</button><button onclick="applyPenalty('${t.id}',-5)" class="penalty-btn bg-blue-500/10 text-blue-500">-5</button></div></td><td class="px-8 py-6 text-center"><div class="flex justify-center gap-3"><button onclick="togglePriSpk('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateSpkId===pid?'volume-2':'volume-x'}" class="w-5 h-5"></i></button><button onclick="togglePriMic('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateMicId===pid?'mic':'mic-off'}" class="w-5 h-5"></i></button></div></td><td class="px-8 py-6 text-right">${t.last_lat ? `<button onclick="openTeamModal('${t.id}')" class="text-emerald-500 text-[10px] font-black animate-pulse flex flex-col items-end tracking-widest uppercase">● CANLI İZLE <span class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">KONUM AKTİF</span></button>` : `<span class="text-slate-800 text-[9px] font-bold uppercase tracking-widest text-right">Bağlantı Yok</span>`}</td></tr>`}).join('');
            document.getElementById('refsBody').innerHTML = refsData.map(r => {
                const pid = 'SDU_REF_' + r.id.substring(0,8);
                return `<tr class="hover:bg-white/5 text-center"><td class="px-8 py-6 font-bold uppercase text-white text-left">${r.name}</td><td class="px-8 py-6 font-mono text-emerald-500 font-bold tracking-widest uppercase text-left">${r.code}</td><td class="px-8 py-6"><div class="flex gap-3 justify-center"><button onclick="togglePriSpk('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateSpkId===pid?'volume-2':'volume-x'}" class="w-5 h-5"></i></button><button onclick="togglePriMic('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateMicId===pid?'mic':'mic-off'}" class="w-5 h-5"></i></button></div></td><td class="px-8 py-6 text-right">${r.last_lat ? '<span class="text-emerald-500 font-black animate-pulse text-[10px]">● CANLI</span>' : '<span class="text-slate-800 text-[9px]">SİNYAL YOK</span>'}</td><td class="px-8 py-6"><button onclick="delRef('${r.id}')" class="p-3 text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td></tr>`}).join('');
            lucide.createIcons();
        }

        // --- GELİŞMİŞ SES SİSTEMİ (DİNAMİK YÖNLENDİRME) ---
        async function initVoice() {
            if (isInitializing) return; isInitializing = true;
            if (peer) { try { peer.disconnect(); peer.destroy(); } catch(e) {} peer = null; await new Promise(r => setTimeout(r, 2000)); }
            
            peer = new Peer('SDU_ADMIN_2026_VOICE', { debug: 1, config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });

            peer.on('open', (id) => { 
                isInitializing = false; 
                document.getElementById('connStatusText').innerText = "HAT AKTİF: SDÜ KOMUTA"; 
                document.getElementById('connStatusText').style.color = "#10b981";
                startHeartbeat();
            });
            
            peer.on('call', async (call) => {
                if (!myStream) {
                    try { 
                        myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                        // Admin ilk açıldığında trackleri kapalı tutar, butonlar açar
                        myStream.getAudioTracks().forEach(t => t.enabled = false);
                    } catch(e) { showToast("Mic Error", true); }
                }
                call.answer(myStream);
                activeCalls[call.peer] = call;
                
                call.on('stream', (rs) => {
                    let a = document.getElementById('audio-'+call.peer);
                    if(!a) { a = document.createElement('audio'); a.id='audio-'+call.peer; a.autoplay=true; document.getElementById('audioPlayers').appendChild(a); }
                    a.srcObject = rs; updateAudioRouting();
                });
                call.on('close', () => { delete activeCalls[call.peer]; if(document.getElementById('audio-'+call.peer)) document.getElementById('audio-'+call.peer).remove(); });
            });

            peer.on('error', (err) => { 
                isInitializing = false;
                if(err.type === 'unavailable-id' || err.type === 'id-taken') {
                    document.getElementById('connStatusText').innerText = "ID MEŞGUL! BEKLENİYOR...";
                    document.getElementById('connStatusText').style.color = "#ef4444";
                    setTimeout(initVoice, 10000);
                }
            });
        }

        // KANALLAR ARASI SES YÖNETİMİ (ASIL ÇÖZÜM BURASI)
        async function updateMicRouting() {
            if(!myStream) { try { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) { return; } }
            
            // Fiziksel mikrofonu sadece birileriyle konuşuyorsak açıyoruz
            const isBroadcasting = (tmMic || rfMic || privateMicId !== null);
            myStream.getAudioTracks().forEach(track => track.enabled = isBroadcasting);

            // TÜM AKTİF BAĞLANTILARI TARA VE YETKİLERİ GÜNCELLE
            Object.keys(activeCalls).forEach(pid => {
                const call = activeCalls[pid];
                if (call.peerConnection) {
                    const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                    if(sender) {
                        let canTalk = false;
                        if(privateMicId === pid) canTalk = true;
                        else if(!privateMicId) {
                            if(tmMic && pid.includes('SDU_TEAM_')) canTalk = true;
                            if(rfMic && pid.includes('SDU_REF_')) canTalk = true;
                        }
                        sender.track.enabled = canTalk;
                    }
                }
            });
            render();
        }

        function toggleTSpk() { tmSpk = !tmSpk; if(tmSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleTMic() { tmMic = !tmMic; if(tmMic) privateMicId=null; updateMicRouting(); upUI(); }
        function toggleRSpk() { rfSpk = !rfSpk; if(rfSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleRMic() { rfMic = !rfMic; if(rfMic) privateMicId=null; updateMicRouting(); upUI(); }
        function togglePriMic(id) { privateMicId = (privateMicId === id) ? null : id; updateMicRouting(); }
        function togglePriSpk(id) { privateSpkId = (privateSpkId === id) ? null : id; updateAudioRouting(); render(); }
        
        function updateAudioRouting() {
            document.querySelectorAll('#audioPlayers audio').forEach(a => {
                const id = a.id.replace('audio-','');
                a.muted = true;
                if(privateSpkId === id) a.muted = false;
                else if(!privateSpkId) {
                    if(id.includes('SDU_TEAM_') && tmSpk) a.muted = false;
                    if(id.includes('SDU_REF_') && rfSpk) a.muted = false;
                }
            });
        }

        function upUI() {
            document.getElementById('tmSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('tmMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            document.getElementById('rfSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('rfMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            lucide.createIcons();
        }

        function startHeartbeat() {
            setInterval(() => { if (peer && peer.socket && peer.socket._open) peer.socket.send({type: 'HEARTBEAT'}); }, 15000);
        }
        function manualVoiceReset() { document.getElementById('voiceResetIcon').classList.add('animate-spin'); initVoice().finally(() => setTimeout(() => document.getElementById('voiceResetIcon').classList.remove('animate-spin'), 2000)); }
        async function addReferee() { const n=document.getElementById('newRefName').value, c=document.getElementById('newRefCode').value.toUpperCase(); if(n&&c) { await supabaseClient.from('referees').insert({name:n, code:c}); fetchData(); } }
        async function delRef(id) { if(confirm('Silinsin mi?')) { await supabaseClient.from('referees').delete().eq('id',id); fetchData(); } }
        async function updateTeamCode(id, c) { await supabaseClient.from('registrations').update({team_code:c.toUpperCase()}).eq('id',id); fetchData(); }
        async function timerCtrl(id, act) { const t=teamsData.find(x=>x.id===id); let up={}; if(act==='start') up={is_timer_running:true, timer_started_at:new Date().toISOString()}; else if(act==='stop') up={is_timer_running:false, elapsed_seconds:Number(t.elapsed_seconds||0)+Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000)}; else if(act==='reset') { if(!confirm('Sıfırla?')) return; up={is_timer_running:false, elapsed_seconds:0, timer_started_at:null}; } await supabaseClient.from('registrations').update(up).eq('id',id); fetchData(); }
        async function applyPenalty(id, m) { const t=teamsData.find(x=>x.id===id); const cur=Number(t.elapsed_seconds||0)+(t.is_timer_running?Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000):0); await supabaseClient.from('registrations').update({elapsed_seconds:Math.max(0,cur+(m*60)), timer_started_at:t.is_timer_running?new Date().toISOString():null}).eq('id',id); fetchData(); }
        function openTeamModal(id) {
            const t=teamsData.find(x=>x.id===id); const tRp=reportsData.filter(r=>r.team_id===id);
            let path=""; if(t.path_history?.length) { path="&path=color:0x3b82f6|weight:5"; t.path_history.slice(-25).forEach(p=>path+=`|${p.lat},${p.lng}`); }
            const map=t.last_lat ? `<iframe class="w-full h-80 rounded-[2rem] mb-6 shadow-2xl border-2 border-white/5" src="https://maps.google.com/maps?q=${t.last_lat},${t.last_lng}&z=17&output=embed${path}"></iframe>` : '<div class="p-10 text-center glass rounded-2xl mb-6 text-slate-500">KONUM YOK</div>';
            document.getElementById('modalBody').innerHTML=`<h2 class="text-3xl font-black mb-6 uppercase">${t.team_name}</h2>${map}<div class="grid md:grid-cols-2 gap-6 text-left"><div><h4 class="text-[10px] font-black text-slate-500 uppercase mb-4">Raporlar</h4>${tRp.map(r=>`<div class="p-4 bg-white/5 rounded-2xl mb-2 border border-white/5"><div><span class="text-emerald-500 font-black text-[10px] uppercase">${r.referees?.name}</span><p class="text-xs mt-1 text-white">${r.notes||'Not yok.'}</p></div>${r.success?'<i data-lucide="check-circle" class="text-emerald-500"></i>':'<i data-lucide="x-circle" class="text-red-500"></i>'}</div>`).join('')||'<p class="text-xs">Rapor yok.</p>'}</div><div><h4 class="text-[10px] font-black text-slate-500 uppercase mb-4">Üyeler</h4>${t.members.map(m=>`<div class="p-3 glass rounded-xl mb-2 flex justify-between text-white"><span>${m.name}</span><a href="tel:${m.phone}" class="text-emerald-500"><i data-lucide="phone"></i></a></div>`).join('')}</div></div>`;
            document.getElementById('teamModal').classList.remove('opacity-0','pointer-events-none'); lucide.createIcons();
        }
        function closeModal() { document.getElementById('teamModal').classList.add('opacity-0','pointer-events-none'); }
        function formatTime(t) { let s=Number(t.elapsed_seconds||0); if(t.is_timer_running) s+=Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000); return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        function showToast(m, e) { const d=document.createElement('div'); d.className=`p-4 rounded-xl text-[10px] font-black uppercase tracking-widest glass border ${e?'border-red-500 text-red-500':'border-emerald-500 text-emerald-500'}`; d.innerText=m; document.getElementById('toastArea').appendChild(d); setTimeout(()=>d.remove(),3000); }
        window.onload = () => { fetchData(); initVoice(); supabaseClient.channel('adm_sync').on('postgres_changes',{event:'*',schema:'public',table:'registrations'},fetchData).subscribe(); };
        setInterval(() => { teamsData.forEach(t => { if(t.is_timer_running) { const el=document.getElementById(`timer-${t.id}`); if(el) el.innerText=formatTime(t); } }); }, 1000);
    </script>
</body>
</html>
