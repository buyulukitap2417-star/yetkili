<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn.active { background: #9b1c31; color: white; }
        .mic-active { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .penalty-btn { font-size: 8px; font-weight: 800; padding: 4px 6px; border-radius: 6px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9b1c31; border-radius: 10px; }
    </style>
</head>
<body class="p-8">
    <div id="audioPlayers" class="hidden"></div>

    <!-- MODAL -->
    <div id="teamModal" class="fixed inset-0 z-[600] flex items-center justify-center bg-black/80 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity">
        <div class="glass w-full max-w-2xl rounded-[3rem] p-10 relative border-t-4 border-red-700 text-white shadow-3xl">
            <button onclick="closeModal()" class="absolute top-8 right-8 p-2 glass rounded-full hover:text-red-500"><i data-lucide="x"></i></button>
            <div id="modalBody" class="max-h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex justify-between items-center glass p-8 rounded-[2.5rem]">
            <div class="flex items-center gap-5">
                <div class="p-5 bg-red-700 rounded-3xl"><i data-lucide="shield-check"></i></div>
                <div><h1 class="text-3xl font-black uppercase leading-none">SDÜ <span class="text-red-600">KOMUTA</span></h1><p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">MERKEZ KONTROL SİSTEMİ</p></div>
            </div>
            <div class="flex gap-3">
                <button onclick="switchTab('teams')" id="tTeams" class="tab-btn active px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Yarışmacılar</button>
                <button onclick="switchTab('refs')" id="tRefs" class="tab-btn px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Hakemler</button>
            </div>
        </header>

        <!-- TELSİZ MERKEZİ (4 SEÇENEKLİ) -->
        <div class="glass p-8 rounded-[2.5rem] grid md:grid-cols-4 gap-4 border-b-2 border-red-900/30">
            <div class="space-y-3">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Yarışmacı Genel</p>
                <div class="flex gap-2">
                    <button id="tmSpk" onclick="toggleTSpk()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="volume-x" class="w-4 h-4 mx-auto mb-1"></i>Duy</button>
                    <button id="tmMic" onclick="toggleTMic()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="mic-off" class="w-4 h-4 mx-auto mb-1"></i>Anons</button>
                </div>
            </div>
            <div class="space-y-3">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Hakem Genel</p>
                <div class="flex gap-2">
                    <button id="rfSpk" onclick="toggleRSpk()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="volume-x" class="w-4 h-4 mx-auto mb-1"></i>Duy</button>
                    <button id="rfMic" onclick="toggleRMic()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="mic-off" class="w-4 h-4 mx-auto mb-1"></i>Anons</button>
                </div>
            </div>
            <div class="md:col-span-2 bg-black/20 rounded-2xl p-4 flex flex-col justify-center items-center">
                <p id="callStatus" class="text-[10px] font-black text-emerald-500 uppercase animate-pulse">Sinyal Aktif</p>
                <p class="text-[8px] text-slate-500 uppercase mt-1">PeerJS Altyapısı Devrede</p>
            </div>
        </div>

        <div id="teamsPanel" class="glass rounded-[3rem] overflow-hidden">
            <table class="w-full text-left text-white border-collapse">
                <thead class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-slate-400"><tr class="border-b border-white/5"><th class="px-8 py-6">Takım</th><th class="px-8 py-6 text-center">Süre</th><th class="px-8 py-6 text-center">Ceza</th><th class="px-8 py-6 text-center">Telsiz</th><th class="px-8 py-6 text-right">Takip</th></tr></thead>
                <tbody id="teamsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <div id="refsPanel" class="hidden glass rounded-[3rem] overflow-hidden">
            <table class="w-full text-left text-white border-collapse">
                <thead class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-slate-400"><tr class="border-b border-white/5"><th class="px-8 py-6">Hakem</th><th class="px-8 py-6">Kod</th><th class="px-8 py-6 text-center">Telsiz</th><th class="px-8 py-6 text-right">Takip</th></tr></thead>
                <tbody id="refsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let teamsData = [], refsData = [], peer = null, myStream = null;
        let activeCalls = {}, privateMicId = null, privateSpkId = null;
        let tmSpk = false, tmMic = false, rfSpk = false, rfMic = false;

        async function fetchData() {
            const { data: t } = await supabaseClient.from('registrations').select('*').order('team_name');
            const { data: r } = await supabaseClient.from('referees').select('*').order('name');
            teamsData = t; refsData = r; render();
        }

        function switchTab(t) {
            document.getElementById('teamsPanel').classList.toggle('hidden', t !== 'teams');
            document.getElementById('refsPanel').classList.toggle('hidden', t !== 'refs');
            document.getElementById('tTeams').classList.toggle('active', t === 'teams');
            document.getElementById('tRefs').classList.toggle('active', t === 'refs');
        }

        function render() {
            document.getElementById('teamsBody').innerHTML = teamsData.map(t => {
                const pid = 'SDU_TEAM_' + t.id.substring(0,8);
                return `<tr class="hover:bg-white/5 transition-colors">
                    <td class="px-8 py-6"><button onclick="openTeam('${t.id}')" class="font-bold uppercase text-white hover:text-red-500">${t.team_name}</button></td>
                    <td class="px-8 py-6 text-center font-mono font-bold">${formatTime(t)}</td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-1 justify-center"><button onclick="penalty('${t.id}',5)" class="penalty-btn">+5</button><button onclick="penalty('${t.id}',-5)" class="penalty-btn">-5</button></div></td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-2 justify-center"><button onclick="togglePrivateSpk('${pid}')" class="p-2 glass rounded-lg ${privateSpkId === pid ? 'bg-blue-600 text-white' : 'text-slate-500'}"><i data-lucide="volume-2" class="w-4 h-4"></i></button><button onclick="togglePrivateMic('${pid}')" class="p-2 glass rounded-lg ${privateMicId === pid ? 'bg-red-600 text-white' : 'text-slate-500'}"><i data-lucide="mic" class="w-4 h-4"></i></button></div></td>
                    <td class="px-8 py-6 text-right">${t.last_lat ? '<span class="text-emerald-500 text-[9px] font-black animate-pulse">● CANLI</span>' : '<span class="text-slate-700 text-[9px] uppercase">Çevrimdışı</span>'}</td>
                </tr>`}).join('');

            document.getElementById('refsBody').innerHTML = refsData.map(r => {
                const pid = 'SDU_REF_' + r.id.substring(0,8);
                return `<tr class="hover:bg-white/5 transition-colors">
                    <td class="px-8 py-6"><button onclick="openRef('${r.id}')" class="font-bold uppercase text-white">${r.name}</button></td>
                    <td class="px-8 py-6 font-mono text-emerald-500 font-bold">${r.code}</td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-2 justify-center"><button onclick="togglePrivateSpk('${pid}')" class="p-2 glass rounded-lg ${privateSpkId === pid ? 'bg-blue-600 text-white' : 'text-slate-500'}"><i data-lucide="volume-2" class="w-4 h-4"></i></button><button onclick="togglePrivateMic('${pid}')" class="p-2 glass rounded-lg ${privateMicId === pid ? 'bg-red-600 text-white' : 'text-slate-500'}"><i data-lucide="mic" class="w-4 h-4"></i></button></div></td>
                    <td class="px-8 py-6 text-right">${r.last_lat ? '<span class="text-emerald-500 text-[9px] font-black animate-pulse">● CANLI</span>' : '<span class="text-slate-700 text-[9px] uppercase">Sinyal Yok</span>'}</td>
                </tr>`}).join('');
            lucide.createIcons();
        }

        // PEERJS SES SİSTEMİ
        function initVoice() {
            peer = new Peer('SDU_ADMIN_2026_VOICE');
            peer.on('call', async (call) => {
                if (!myStream) { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); myStream.getAudioTracks()[0].enabled = false; }
                call.answer(myStream); activeCalls[call.peer] = call;
                call.on('stream', (rs) => {
                    let a = document.getElementById('audio-'+call.peer);
                    if(!a) { a = document.createElement('audio'); a.id='audio-'+call.peer; a.autoplay=true; document.getElementById('audioPlayers').appendChild(a); }
                    a.srcObject = rs; updateAudioRouting();
                });
            });
        }

        function updateAudioRouting() {
            document.querySelectorAll('#audioPlayers audio').forEach(a => {
                const id = a.id.replace('audio-','');
                const isTeam = id.includes('SDU_TEAM_');
                const isRef = id.includes('SDU_REF_');
                a.muted = true;
                if(privateSpkId === id) a.muted = false;
                else if(isTeam && tmSpk && privateSpkId === null) a.muted = false;
                else if(isRef && rfSpk && privateSpkId === null) a.muted = false;
            });
        }

        async function updateMicRouting() {
            if(!myStream) { try { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) { return; } }
            myStream.getAudioTracks()[0].enabled = (tmMic || rfMic || privateMicId !== null);
            Object.keys(activeCalls).forEach(pid => {
                const sender = activeCalls[pid].peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                if(sender) {
                    let canTalk = false;
                    if(privateMicId === pid) canTalk = true;
                    else if(tmMic && pid.includes('SDU_TEAM_') && privateMicId === null) canTalk = true;
                    else if(rfMic && pid.includes('SDU_REF_') && privateMicId === null) canTalk = true;
                    sender.track.enabled = canTalk;
                }
            });
            render();
        }

        function toggleTSpk() { tmSpk = !tmSpk; if(tmSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleTMic() { tmMic = !tmMic; if(tmMic) privateMicId=null; updateMicRouting(); upUI(); }
        function toggleRSpk() { rfSpk = !rfSpk; if(rfSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleRMic() { rfMic = !rfMic; if(rfMic) privateMicId=null; updateMicRouting(); upUI(); }
        function togglePrivateMic(id) { privateMicId = (privateMicId === id) ? null : id; updateMicRouting(); }
        function togglePrivateSpk(id) { privateSpkId = (privateSpkId === id) ? null : id; updateAudioRouting(); render(); }

        function upUI() {
            document.getElementById('tmSpk').className = tmSpk ? "flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-bold uppercase" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('tmMic').className = tmMic ? "flex-1 py-3 bg-red-600 text-white rounded-xl text-[10px] font-bold uppercase mic-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('rfSpk').className = rfSpk ? "flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-bold uppercase" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('rfMic').className = rfMic ? "flex-1 py-3 bg-red-600 text-white rounded-xl text-[10px] font-bold uppercase mic-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            lucide.createIcons();
        }

        function openTeam(id) {
            const t = teamsData.find(x => x.id === id);
            let map = t.last_lat ? `<iframe class="w-full h-64 rounded-3xl mb-6" src="https://maps.google.com/maps?q=${t.last_lat},${t.last_lng}&z=16&output=embed"></iframe>` : '';
            document.getElementById('modalBody').innerHTML = `<h2 class="text-2xl font-black mb-6 uppercase">${t.team_name}</h2>${map}<div class="space-y-3">${t.members.map(m => `<div class="p-4 glass rounded-2xl"><b>${m.name}</b><br><small>${m.phone} | ${m.dept}</small></div>`).join('')}</div>`;
            document.getElementById('teamModal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function openRef(id) {
            const r = refsData.find(x => x.id === id);
            let map = r.last_lat ? `<iframe class="w-full h-64 rounded-3xl mb-6" src="https://maps.google.com/maps?q=${r.last_lat},${r.last_lng}&z=16&output=embed"></iframe>` : '';
            document.getElementById('modalBody').innerHTML = `<h2 class="text-2xl font-black mb-6 uppercase">${r.name}</h2>${map}<p class="p-4 glass rounded-2xl text-emerald-500 font-bold">KOD: ${r.code}</p>`;
            document.getElementById('teamModal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() { document.getElementById('teamModal').classList.add('opacity-0', 'pointer-events-none'); }
        function formatTime(t) { let s = Number(t.elapsed_seconds || 0); if(t.is_timer_running) s += Math.floor((Date.now() - new Date(t.timer_started_at).getTime())/1000); return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        async function penalty(id, m) { const t = teamsData.find(x=>x.id===id); const cur = Number(t.elapsed_seconds||0) + (t.is_timer_running ? Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000) : 0); await supabaseClient.from('registrations').update({ elapsed_seconds: cur + (m*60), timer_started_at: t.is_timer_running ? new Date().toISOString() : null }).eq('id', id); fetchData(); }

        window.onload = () => { fetchData(); initVoice(); setInterval(fetchData, 10000); supabaseClient.channel('sync').on('postgres_changes',{event:'*',schema:'public',table:'registrations'},fetchData).subscribe(); };
    </script>
</body>
</html>
