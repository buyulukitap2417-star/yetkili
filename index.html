<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komuta Merkezi | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; opacity: 0.5; }
        .tab-btn.active { border-color: #ef4444; color: #ef4444; opacity: 1; background: rgba(239, 68, 68, 0.05); }
        .penalty-btn { font-size: 10px; font-weight: 800; width: 38px; height: 30px; border-radius: 8px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .mic-active { background: #ef4444 !important; animation: pulse-mic 1.5s infinite; color: white !important; }
        .spk-active { background: #3b82f6 !important; border-color: #3b82f6 !important; color: white !important; }
        @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9b1c31; border-radius: 10px; }
        .team-code-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; padding: 0.25rem 0.5rem; width: 100px; text-align: center; font-family: monospace; font-weight: bold; color: #ef4444; text-transform: uppercase; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toastArea" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-xs space-y-2"></div>
    <div id="audioPlayers" class="hidden"></div>

    <div id="teamModal" class="fixed inset-0 z-[600] flex items-center justify-center bg-black/95 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity">
        <div class="glass w-full max-w-3xl rounded-[2.5rem] p-8 relative border-t-4 border-red-700 text-white shadow-3xl text-left">
            <button onclick="closeModal()" class="absolute top-8 right-8 p-3 glass rounded-full hover:text-red-500"><i data-lucide="x"></i></button>
            <div id="modalBody" class="max-h-[85vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row justify-between items-center glass p-6 rounded-3xl gap-4 border border-white/5 shadow-2xl">
            <div class="flex items-center gap-4 text-left">
                <div class="p-4 bg-red-700 rounded-2xl shadow-xl"><i data-lucide="shield-check" class="text-white"></i></div>
                <div><h1 class="text-2xl font-black uppercase leading-none">SDÜ <span class="text-red-600">KOMUTA</span></h1><p id="connStatus" class="text-[9px] text-slate-500 uppercase tracking-widest font-bold mt-1">HAT BAŞLATILIYOR...</p></div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="initVoice()" class="p-3 glass rounded-xl text-slate-400 hover:text-emerald-500 transition-colors"><i data-lucide="refresh-cw"></i></button>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/10">
                    <button onclick="switchTab('teams')" id="tBtn" class="tab-btn active px-6 py-2 text-[10px] font-black uppercase">Yarışmacılar</button>
                    <button onclick="switchTab('refs')" id="rBtn" class="tab-btn px-6 py-2 text-[10px] font-black uppercase">Hakemler</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-red-600 text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Yarışmacı Genel</p>
                <div class="flex gap-3">
                    <button id="tmSpk" onclick="toggleChannel('TEAM', 'spk')" class="flex-1 py-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x"></i>DİNLE</button>
                    <button id="tmMic" onclick="toggleChannel('TEAM', 'mic')" class="flex-1 py-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off"></i>ANONS YAP</button>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] border-l-4 border-emerald-600 text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Hakem Genel</p>
                <div class="flex gap-3">
                    <button id="rfSpk" onclick="toggleChannel('REF', 'spk')" class="flex-1 py-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x"></i>DİNLE</button>
                    <button id="rfMic" onclick="toggleChannel('REF', 'mic')" class="flex-1 py-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off"></i>ANONS YAP</button>
                </div>
            </div>
        </div>

        <div id="panelTeams" class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left text-white border-collapse">
                <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400">
                    <tr><th class="px-8 py-6">Takım</th><th class="px-8 py-6 text-center">Süre</th><th class="px-8 py-6 text-center">Ceza</th><th class="px-8 py-6 text-center">Özel Ses</th><th class="px-8 py-6 text-right">Durum</th></tr>
                </thead>
                <tbody id="teamsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <div id="panelRefs" class="hidden space-y-4">
            <div class="glass p-8 rounded-[2rem] flex flex-wrap items-center justify-between gap-6 border border-white/5 text-left">
                <div class="flex gap-4 flex-1 min-w-[300px]">
                    <div class="flex-1"><label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Hakem Adı</label><input type="text" id="rn" placeholder="Örn: Nokta 1 Hakemi" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white"></div>
                    <div class="w-40"><label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Kod</label><input type="text" id="rc" placeholder="HAKEM01" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white uppercase"></div>
                </div>
                <button onclick="addRef()" class="mt-6 px-10 py-3.5 bg-emerald-600 text-white rounded-xl text-[11px] font-black uppercase tracking-widest shadow-xl">Hakem Ekle</button>
            </div>
            <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
                <table class="w-full text-left text-white border-collapse"><tbody id="refsBody" class="divide-y divide-white/5 text-sm"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let teamsData = [], refsData = [], reportsData = [], peer = null, myStream = null;
        let activeCalls = {};
        let tmSpk = false, tmMic = false, rfSpk = false, rfMic = false;
        let privateMicId = null, privateSpkId = null;

        async function fetchData() {
            const { data: t } = await supabaseClient.from('registrations').select('*').order('team_name');
            const { data: r } = await supabaseClient.from('referees').select('*').order('name');
            const { data: rp } = await supabaseClient.from('referee_reports').select('*, referees(name)');
            teamsData = t || []; refsData = r || []; reportsData = rp || []; render();
        }

        function render() {
            document.getElementById('teamsBody').innerHTML = teamsData.map(t => {
                const pid = 'SDU_TEAM_' + t.id.substring(0,8);
                return `<tr class="hover:bg-white/5">
                    <td class="px-8 py-6 text-left"><button onclick="openTeam('${t.id}')" class="font-black uppercase hover:text-red-500 transition-colors">${t.team_name}</button><div class="text-[9px] text-slate-500 font-mono mt-1">${t.team_code||'KOD YOK'}</div></td>
                    <td class="px-8 py-6 text-center font-mono font-bold">${formatTime(t)}</td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-1.5 justify-center"><button onclick="penalty('${t.id}',5)" class="penalty-btn bg-orange-500/10 text-orange-500">+5</button><button onclick="penalty('${t.id}',-5)" class="penalty-btn bg-blue-500/10 text-blue-500">-5</button></div></td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-2 justify-center"><button onclick="togglePrivate('${pid}', 'spk')" class="p-3 rounded-xl ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-500'}"><i data-lucide="volume-2" class="w-5 h-5"></i></button><button onclick="togglePrivate('${pid}', 'mic')" class="p-3 rounded-xl ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-500'}"><i data-lucide="mic" class="w-5 h-5"></i></button></div></td>
                    <td class="px-8 py-6 text-right">${t.last_lat ? '<span class="text-emerald-500 animate-pulse text-[10px] font-black">● CANLI</span>' : '○'}</td>
                </tr>`}).join('');

            document.getElementById('refsBody').innerHTML = refsData.map(r => {
                const pid = 'SDU_REF_' + r.id.substring(0,8);
                return `<tr class="hover:bg-white/5">
                    <td class="px-8 py-6 text-left font-bold uppercase text-white">${r.name}</td>
                    <td class="px-8 py-6 text-left font-mono text-emerald-500">${r.code}</td>
                    <td class="px-8 py-6 text-center"><div class="flex gap-3 justify-center"><button onclick="togglePrivate('${pid}', 'spk')" class="p-3 rounded-xl ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-500'}"><i data-lucide="volume-2" class="w-5 h-5"></i></button><button onclick="togglePrivate('${pid}', 'mic')" class="p-3 rounded-xl ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-500'}"><i data-lucide="mic" class="w-5 h-5"></i></button></div></td>
                    <td class="px-8 py-6 text-right">${r.last_lat ? '●' : '○'}</td>
                    <td class="px-8 py-6 text-center"><button onclick="delRef('${r.id}')" class="text-red-500 hover:scale-110 transition-transform"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>
                </tr>`}).join('');
            lucide.createIcons();
        }

        // --- GELİŞMİŞ SES SANTRALİ ---
        async function initVoice() {
            if (peer) { peer.destroy(); peer = null; await new Promise(r => setTimeout(r, 2000)); }
            
            peer = new Peer('SDU_ADMIN_2026_VOICE', { debug: 1, config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });

            peer.on('open', (id) => { 
                document.getElementById('connStatus').innerText = "HAT AKTİF: " + id;
                document.getElementById('connStatus').className = "text-[9px] text-emerald-500 font-bold uppercase";
                startHeartbeat();
            });
            
            peer.on('call', async (call) => {
                if (!myStream) {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                // Cevap verirken track'i her zaman ekle, butonla track'i aktif/pasif et
                call.answer(myStream);
                activeCalls[call.peer] = call;

                call.on('stream', (remoteStream) => {
                    let a = document.getElementById('audio-'+call.peer);
                    if(!a) { a = document.createElement('audio'); a.id='audio-'+call.peer; a.autoplay=true; document.getElementById('audioPlayers').appendChild(a); }
                    a.srcObject = remoteStream;
                    broadcastSettings();
                });

                call.on('close', () => { delete activeCalls[call.peer]; if(document.getElementById('audio-'+call.peer)) document.getElementById('audio-'+call.peer).remove(); });
            });

            peer.on('error', (err) => {
                if(err.type === 'id-taken') {
                    document.getElementById('connStatus').innerText = "ID MEŞGUL, 3SN BEKLEYİN...";
                    setTimeout(initVoice, 3000);
                }
            });
        }

        // TÜM CİHAZLARA SES DURUMUNU YAYAN ÇEKİRDEK FONKSİYON
        function broadcastSettings() {
            if (!myStream) return;

            // Global mikrofonu buton durumuna göre aç/kapa
            const isAnyMicActive = (tmMic || rfMic || privateMicId !== null);
            myStream.getAudioTracks().forEach(track => track.enabled = isAnyMicActive);

            Object.keys(activeCalls).forEach(pid => {
                const call = activeCalls[pid];
                // Giden Ses (Admin -> Alıcı)
                const sender = call.peerConnection?.getSenders().find(s => s.track?.kind === 'audio');
                if (sender) {
                    let shouldHearAdmin = false;
                    if (privateMicId === pid) shouldHearAdmin = true;
                    else if (!privateMicId) {
                        if (tmMic && pid.startsWith('SDU_TEAM_')) shouldHearAdmin = true;
                        if (rfMic && pid.startsWith('SDU_REF_')) shouldHearAdmin = true;
                    }
                    sender.track.enabled = shouldHearAdmin;
                }

                // Gelen Ses (Alıcı -> Admin Hoparlörü)
                const audioEl = document.getElementById('audio-'+pid);
                if (audioEl) {
                    let shouldBeMuted = true;
                    if (privateSpkId === pid) shouldBeMuted = false;
                    else if (!privateSpkId) {
                        if (tmSpk && pid.startsWith('SDU_TEAM_')) shouldBeMuted = false;
                        if (rfSpk && pid.startsWith('SDU_REF_')) shouldBeMuted = false;
                    }
                    audioEl.muted = shouldBeMuted;
                }
            });
        }

        function toggleChannel(type, mode) {
            if (mode === 'mic') {
                if (type === 'TEAM') { tmMic = !tmMic; rfMic = false; } else { rfMic = !rfMic; tmMic = false; }
                privateMicId = null;
            } else {
                if (type === 'TEAM') { tmSpk = !tmSpk; rfSpk = false; } else { rfSpk = !rfSpk; tmSpk = false; }
                privateSpkId = null;
            }
            broadcastSettings();
            upUI();
        }

        function togglePrivate(pid, mode) {
            if (mode === 'mic') { privateMicId = (privateMicId === pid) ? null : pid; tmMic = false; rfMic = false; }
            else { privateSpkId = (privateSpkId === pid) ? null : pid; tmSpk = false; rfSpk = false; }
            broadcastSettings();
            upUI();
        }

        function upUI() {
            document.getElementById('tmSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('tmMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            document.getElementById('rfSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('rfMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            render();
        }

        // YARDIMCI SİSTEMLER
        function startHeartbeat() { setInterval(() => { if (peer?.socket?._open) peer.socket.send({type: 'HEARTBEAT'}); }, 15000); }
        function switchTab(t) { document.getElementById('panelTeams').classList.toggle('hidden', t !== 'teams'); document.getElementById('panelRefs').classList.toggle('hidden', t !== 'refs'); document.getElementById('tBtn').classList.toggle('active', t === 'teams'); document.getElementById('rBtn').classList.toggle('active', t === 'refs'); }
        async function updateCode(id, c) { await supabaseClient.from('registrations').update({team_code:c.toUpperCase()}).eq('id',id); fetchData(); }
        async function timerCtrl(id, act) { const t=teamsData.find(x=>x.id===id); let up={}; if(act==='start') up={is_timer_running:true, timer_started_at:new Date().toISOString()}; else if(act==='stop') up={is_timer_running:false, elapsed_seconds:Number(t.elapsed_seconds||0)+Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000)}; else if(act==='reset') { if(!confirm('Sıfırla?')) return; up={is_timer_running:false, elapsed_seconds:0, timer_started_at:null}; } await supabaseClient.from('registrations').update(up).eq('id',id); fetchData(); }
        async function penalty(id, m) { const t=teamsData.find(x=>x.id===id); const cur=Number(t.elapsed_seconds||0)+(t.is_timer_running?Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000):0); await supabaseClient.from('registrations').update({elapsed_seconds:Math.max(0,cur+(m*60)), timer_started_at:t.is_timer_running?new Date().toISOString():null}).eq('id',id); fetchData(); }
        function formatTime(t) { let s=Number(t.elapsed_seconds||0); if(t.is_timer_running) s+=Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000); return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        function openTeam(id) {
            const t=teamsData.find(x=>x.id===id); const tRp=reportsData.filter(r=>r.team_id===id);
            let path=""; if(t.path_history?.length) { path="&path=color:0x3b82f6|weight:5"; t.path_history.slice(-25).forEach(p=>path+=`|${p.lat},${p.lng}`); }
            const map=t.last_lat ? `<iframe class="w-full h-80 rounded-2xl mb-6 shadow-2xl border border-white/5" src="https://maps.google.com/maps?q=${t.last_lat},${t.last_lng}&z=17&output=embed${path}"></iframe>` : '<div class="p-10 text-center glass rounded-2xl mb-6 text-slate-500 uppercase font-black tracking-widest text-xs">GPS VERİSİ YOK</div>';
            document.getElementById('modalBody').innerHTML=`<h2 class="text-3xl font-black mb-6 uppercase tracking-tighter text-left">${t.team_name}</h2>${map}<div class="grid md:grid-cols-2 gap-6 text-left"><div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Hakem Raporları</h4>${tRp.map(r=>`<div class="p-4 bg-white/5 rounded-2xl mb-2 flex justify-between items-center border border-white/5"><div><span class="text-emerald-500 font-black text-[10px] uppercase">${r.referees?.name}</span><p class="text-xs mt-1 text-white">${r.notes||'Not yok.'}</p></div>${r.success?'<i data-lucide="check-circle" class="text-emerald-500"></i>':'<i data-lucide="x-circle" class="text-red-500"></i>'}</div>`).join('')||'<p class="text-xs">Rapor yok.</p>'}</div><div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Üyeler</h4>${t.members.map(m=>`<div class="p-3 glass rounded-xl mb-2 flex justify-between items-center text-white"><span>${m.name}</span><a href="tel:${m.phone}" class="text-emerald-500"><i data-lucide="phone" class="w-4 h-4"></i></a></div>`).join('')}</div></div>`;
            document.getElementById('teamModal').classList.remove('opacity-0','pointer-events-none'); lucide.createIcons();
        }
        function closeModal() { document.getElementById('teamModal').classList.add('opacity-0','pointer-events-none'); }
        async function addRef() { const n=document.getElementById('rn').value, c=document.getElementById('rc').value.toUpperCase(); if(n&&c) { await supabaseClient.from('referees').insert({name:n, code:c}); fetchData(); } }
        async function delRef(id) { if(confirm('Hakem Silinsin mi?')) { await supabaseClient.from('referees').delete().eq('id',id); fetchData(); } }

        window.onload = () => { fetchData(); initVoice(); supabaseClient.channel('adm_sync').on('postgres_changes',{event:'*',schema:'public',table:'registrations'},fetchData).subscribe(); };
        setInterval(() => { teamsData.forEach(t => { if(t.is_timer_running) { const el=document.getElementById(`timer-${t.id}`); if(el) el.innerText=formatTime(t); } }); }, 1000);
        window.onbeforeunload = () => { if(peer) peer.destroy(); };
    </script>
</body>
</html>
