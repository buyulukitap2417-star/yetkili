<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komuta Merkezi | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; opacity: 0.5; }
        .tab-btn.active { border-color: #ef4444; color: #ef4444; opacity: 1; background: rgba(239, 68, 68, 0.05); }
        .penalty-btn { font-size: 10px; font-weight: 800; width: 38px; height: 30px; border-radius: 8px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .penalty-btn:active { transform: scale(0.9); }
        .mic-active { background: #ef4444 !important; animation: pulse-mic 1.5s infinite; border-color: #ef4444 !important; color: white !important; }
        .spk-active { background: #3b82f6 !important; border-color: #3b82f6 !important; color: white !important; }
        @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9b1c31; border-radius: 10px; }
        .modal-content { max-height: 85vh; overflow-y: auto; }
        .team-code-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; padding: 0.25rem 0.5rem; width: 100px; text-align: center; font-family: monospace; font-weight: bold; color: #ef4444; text-transform: uppercase; outline: none; }
        .team-code-input:focus { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 text-center">
    <div id="toastArea" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-xs space-y-2 text-left"></div>
    <div id="audioPlayers" class="hidden"></div>

    <!-- YETKİLİ GİRİŞ MODALI -->
    <div id="adminLoginUI" class="fixed inset-0 z-[3000] flex items-center justify-center bg-slate-950 px-6 text-white text-center">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] border-t-4 border-red-700 shadow-2xl">
            <div class="w-20 h-20 bg-red-700/20 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="lock" class="text-red-500 w-10 h-10"></i></div>
            <h1 class="text-3xl font-black uppercase mb-10 tracking-tighter">YETKİLİ GİRİŞİ</h1>
            <input type="password" id="adminPwd" placeholder="GİRİŞ ŞİFRESİ" class="w-full bg-black/40 border border-white/10 rounded-2xl py-6 px-6 text-center text-2xl font-black outline-none uppercase text-red-500 mb-6 focus:border-red-600 transition-all" onkeypress="if(event.key === 'Enter') adminLogin();">
            <button onclick="adminLogin()" class="w-full py-6 bg-red-700 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">SİSTEMİ AÇ</button>
        </div>
    </div>

    <!-- TAKIM/HAKEM DETAY MODAL -->
    <div id="teamModal" class="fixed inset-0 z-[600] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity duration-300">
        <div class="glass w-full max-w-3xl rounded-[2.5rem] p-8 md:p-12 relative border-t-4 border-red-700 text-white shadow-3xl text-left">
            <button onclick="closeModal()" class="absolute top-8 right-8 p-3 glass rounded-full hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            <div id="modalBody" class="modal-content pr-2"></div>
        </div>
    </div>

    <!-- KAYIT EVRAKLARI MODAL -->
    <div id="infoModal" class="fixed inset-0 z-[700] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity duration-300">
        <div class="glass w-full max-w-4xl rounded-[2.5rem] p-8 md:p-12 relative border-t-4 border-blue-500 text-white shadow-3xl text-left">
            <button onclick="closeInfoModal()" class="absolute top-8 right-8 p-3 glass rounded-full hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            <div id="infoModalBody" class="modal-content pr-2"></div>
        </div>
    </div>

    <div id="adminDashUI" class="hidden max-w-7xl mx-auto space-y-6">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center glass p-6 rounded-3xl gap-4 shadow-2xl border border-white/5">
            <div class="flex items-center gap-4 text-left">
                <div class="p-4 bg-red-700 rounded-2xl shadow-xl shadow-red-900/20"><i data-lucide="shield-check" class="text-white"></i></div>
                <div>
                    <h1 class="text-2xl font-black uppercase leading-none">SDÜ <span class="text-red-600">KOMUTA</span></h1>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-1" id="connStatusText">HAT BAŞLATILIYOR...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="manualVoiceReset()" class="p-3 glass rounded-xl text-slate-400 hover:text-emerald-500 transition-colors" title="Ses Sistemini Resetle">
                    <i data-lucide="refresh-cw" id="voiceResetIcon"></i>
                </button>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/10">
                    <button onclick="switchTab('teams')" id="btnTabTeams" class="tab-btn active px-8 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest">Yarışmacılar</button>
                    <button onclick="switchTab('refs')" id="btnTabRefs" class="tab-btn px-8 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest">Hakemler</button>
                </div>
            </div>
        </header>

        <!-- 4 KANAL TELSİZ MERKEZİ -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-red-600 relative overflow-hidden text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Yarışmacı Genel Hattı</p>
                <div class="flex gap-4">
                    <button id="tmSpk" onclick="toggleTSpk()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x"></i>DUY</button>
                    <button id="tmMic" onclick="toggleTMic()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off"></i>ANONS YAP</button>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] border-l-4 border-emerald-600 relative overflow-hidden text-left">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Hakem Genel Hattı</p>
                <div class="flex gap-4">
                    <button id="rfSpk" onclick="toggleRSpk()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="volume-x"></i>DUY</button>
                    <button id="rfMic" onclick="toggleRMic()" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase flex flex-col items-center gap-2 transition-all"><i data-lucide="mic-off"></i>ANONS YAP</button>
                </div>
            </div>
        </div>

        <!-- YARIŞMACILAR PANELİ -->
        <div id="panelTeams" class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left text-white border-collapse">
                <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400 text-center">
                    <tr>
                        <th class="px-8 py-6 text-left">Takım ve Kod</th>
                        <th class="px-8 py-6">Süre Kontrol</th>
                        <th class="px-8 py-6">Ceza / Bonus</th>
                        <th class="px-8 py-6">Özel Telsiz</th>
                        <th class="px-8 py-6 text-right">Canlı İzle</th>
                    </tr>
                </thead>
                <tbody id="teamsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <!-- HAKEMLER PANELİ -->
        <div id="panelRefs" class="hidden space-y-4">
            <div class="glass p-8 rounded-[2rem] flex flex-wrap items-center justify-between gap-6 border border-white/5 text-left">
                <div class="flex gap-4 flex-1 min-w-[300px]">
                    <div class="flex-1 space-y-2 text-left">
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Hakem Adı</label>
                        <input type="text" id="newRefName" placeholder="Örn: Nokta 1 Hakemi" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white">
                    </div>
                    <div class="w-40 space-y-2 text-left">
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Giriş Kodu</label>
                        <input type="text" id="newRefCode" placeholder="HAKEM01" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-emerald-500 text-white uppercase font-mono">
                    </div>
                </div>
                <button onclick="addReferee()" class="mt-6 px-10 py-3.5 bg-emerald-600 text-white rounded-xl text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-emerald-500 active:scale-95 transition-all">Hakem Kaydet</button>
            </div>
            
            <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
                <table class="w-full text-left text-white border-collapse">
                    <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400 text-center">
                        <tr>
                            <th class="px-8 py-6 text-left">Görevli Hakem</th>
                            <th class="px-8 py-6">Giriş Kodu</th>
                            <th class="px-8 py-6">Özel Telsiz</th>
                            <th class="px-8 py-6 text-right">Konum</th>
                            <th class="px-8 py-6">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="refsBody" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let teamsData = [], refsData = [], reportsData = [], peer = null, myStream = null;
        let activeCalls = {}, privateMicId = null, privateSpkId = null;
        let tmSpk = false, tmMic = false, rfSpk = false, rfMic = false;
        let isInitializing = false;
        
        // CANLI SES GÖSTERGESİ İÇİN
        let activeMics = {}; 

        const adminChannel = new BroadcastChannel('sdu_ory_admin_check');
        adminChannel.onmessage = (event) => {
            if (event.data === 'ping' && peer && peer.open) { adminChannel.postMessage('pong'); } 
            else if (event.data === 'pong') { document.getElementById('connStatusText').innerText = "HATA: DİĞER ADMİN SEKMESİNİ KAPATIN!"; document.getElementById('connStatusText').style.color = "#ef4444"; showToast("ID Çakışması! Başka bir admin sekmesi açık.", true); }
        };

        function adminLogin() {
            const pwd = document.getElementById('adminPwd').value;
            if(pwd === 'KOMUTA2026') {
                sessionStorage.setItem('admin_auth', 'true');
                document.getElementById('adminLoginUI').classList.add('hidden');
                document.getElementById('adminDashUI').classList.remove('hidden');
                fetchData(); 
                initVoice(); 
                supabaseClient.channel('adm_sync').on('postgres_changes', {event:'*', schema:'public', table:'registrations'}, fetchData).subscribe();
            } else {
                showToast("Hatalı Şifre!", true);
            }
        }

        window.onload = () => { 
            lucide.createIcons();
            if (sessionStorage.getItem('admin_auth') === 'true') {
                document.getElementById('adminLoginUI').classList.add('hidden');
                document.getElementById('adminDashUI').classList.remove('hidden');
                fetchData(); 
                initVoice(); 
                supabaseClient.channel('adm_sync').on('postgres_changes', {event:'*', schema:'public', table:'registrations'}, fetchData).subscribe(); 
            }
        };

        async function fetchData() {
            try {
                const { data: t } = await supabaseClient.from('registrations').select('*').order('team_name');
                const { data: r } = await supabaseClient.from('referees').select('*').order('name');
                const { data: rp } = await supabaseClient.from('referee_reports').select('*, referees(name)');
                teamsData = t || []; refsData = r || []; reportsData = rp || []; render();
            } catch (e) { console.error("Veri çekme hatası:", e); }
        }

        function switchTab(t) {
            document.getElementById('panelTeams').classList.toggle('hidden', t !== 'teams');
            document.getElementById('panelRefs').classList.toggle('hidden', t !== 'refs');
            document.getElementById('btnTabTeams').classList.toggle('active', t === 'teams');
            document.getElementById('btnTabRefs').classList.toggle('active', t === 'refs');
        }

        function render() {
            document.getElementById('teamsBody').innerHTML = teamsData.map(t => {
                const pid = 'SDU_TEAM_' + t.id.substring(0,8);
                const isTalking = activeMics[pid];
                const rowClass = isTalking ? 'bg-emerald-500/20 border-l-4 border-emerald-500 transition-colors' : 'hover:bg-white/5 transition-colors';
                const micBadge = isTalking ? `<span class="ml-3 inline-flex items-center gap-1 text-[9px] bg-emerald-500 text-white px-2 py-0.5 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]"><i data-lucide="mic" class="w-3 h-3"></i> KONUŞUYOR</span>` : '';

                return `<tr class="${rowClass}">
                    <td class="px-8 py-6 text-left">
                        <div class="flex items-center gap-3">
                            <button onclick="openTeamModal('${t.id}')" class="font-black uppercase text-white hover:text-red-500 transition-colors">${t.team_name}</button>
                            <button onclick="openInfoModal('${t.id}')" class="p-2 glass rounded-lg text-blue-400 hover:bg-blue-500/20 transition-all shadow-lg" title="Kayıt Evrakları"><i data-lucide="folder-open" class="w-4 h-4"></i></button>
                            ${micBadge}
                        </div>
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-[9px] text-slate-500 font-bold uppercase">KOD:</span>
                            <input type="text" class="team-code-input text-[11px]" value="${t.team_code||''}" onchange="updateTeamCode('${t.id}',this.value)">
                        </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex items-center justify-center gap-3">
                            <button onclick="timerCtrl('${t.id}','${t.is_timer_running?'stop':'start'}')" class="p-2.5 rounded-xl ${t.is_timer_running?'bg-red-500/20 text-red-500':'bg-emerald-500/20 text-emerald-500'} transition-all"><i data-lucide="${t.is_timer_running?'pause':'play'}" class="w-5 h-5"></i></button>
                            <button onclick="timerCtrl('${t.id}','reset')" class="p-2.5 rounded-xl bg-slate-800 text-slate-500 hover:text-white transition-all"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                            <span class="text-sm font-black mono w-20 text-center" id="timer-${t.id}">${formatTime(t)}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex gap-1.5 justify-center">
                            <button onclick="applyPenalty('${t.id}',5)" class="penalty-btn bg-orange-500/10 text-orange-500">+5</button>
                            <button onclick="applyPenalty('${t.id}',25)" class="penalty-btn bg-orange-500/20 text-orange-500 font-black">+25</button>
                            <button onclick="applyPenalty('${t.id}',-5)" class="penalty-btn bg-blue-500/10 text-blue-500">-5</button>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex justify-center gap-3">
                            <button onclick="togglePriSpk('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateSpkId===pid?'volume-2':'volume-x'}" class="w-5 h-5"></i></button>
                            <button onclick="togglePriMic('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateMicId===pid?'mic':'mic-off'}" class="w-5 h-5"></i></button>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-right">
                        ${t.last_lat ? `<button onclick="openTeamModal('${t.id}')" class="text-emerald-500 text-[10px] font-black animate-pulse flex flex-col items-end tracking-widest uppercase">● CANLI İZLE <span class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">KONUM AKTİF</span></button>` : `<span class="text-slate-800 text-[9px] font-bold uppercase tracking-widest text-right">Bağlantı Yok</span>`}
                    </td>
                </tr>`}).join('');

            document.getElementById('refsBody').innerHTML = refsData.map(r => {
                const pid = 'SDU_REF_' + r.id.substring(0,8);
                const isTalking = activeMics[pid];
                const rowClass = isTalking ? 'bg-emerald-500/20 border-l-4 border-emerald-500 transition-colors text-center' : 'hover:bg-white/5 text-center';
                const micBadge = isTalking ? `<span class="ml-3 inline-flex items-center gap-1 text-[9px] bg-emerald-500 text-white px-2 py-0.5 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]"><i data-lucide="mic" class="w-3 h-3"></i> KONUŞUYOR</span>` : '';

                return `<tr class="${rowClass}">
                    <td class="px-8 py-6 text-left font-bold uppercase text-white flex items-center">
                        ${r.name} ${micBadge}
                    </td>
                    <td class="px-8 py-6 font-mono text-emerald-500 font-bold tracking-widest uppercase text-left">${r.code}</td>
                    <td class="px-8 py-6">
                        <div class="flex gap-3 justify-center">
                            <button onclick="togglePriSpk('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateSpkId===pid?'spk-active':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateSpkId===pid?'volume-2':'volume-x'}" class="w-5 h-5"></i></button>
                            <button onclick="togglePriMic('${pid}')" class="p-3 rounded-2xl border border-white/5 ${privateMicId===pid?'mic-active shadow-red-900/40':'bg-slate-800 text-slate-400'} transition-all"><i data-lucide="${privateMicId===pid?'mic':'mic-off'}" class="w-5 h-5"></i></button>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-right">${r.last_lat ? '<span class="text-emerald-500 font-black animate-pulse text-[10px]">● CANLI</span>' : '<span class="text-slate-800 text-[9px]">SİNYAL YOK</span>'}</td>
                    <td class="px-8 py-6 text-center"><button onclick="delRef('${r.id}')" class="p-3 text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>
                </tr>`}).join('');
            lucide.createIcons();
        }

        let voiceResetTimeout = null;

        async function initVoice() {
            if (isInitializing) return;
            isInitializing = true;

            adminChannel.postMessage('ping');

            if (peer) {
                try {
                    peer.disconnect();
                    peer.destroy();
                } catch(e) {}
                peer = null;
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            
            peer = new Peer('SDU_ADMIN_2026_VOICE', { 
                debug: 1,
                config: { 
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'stun:stun1.l.google.com:19302' }
                    ] 
                }
            });

            peer.on('open', (id) => { 
                isInitializing = false;
                console.log('Komuta Merkezi ID Alındı:', id); 
                document.getElementById('connStatusText').innerText = "HAT AKTİF: SDÜ KOMUTA";
                document.getElementById('connStatusText').style.color = "#10b981";
                if(voiceResetTimeout) clearTimeout(voiceResetTimeout);
                startHeartbeat(); 
            });

            // DATA KANALI DİNLEYİCİSİ (CANLI MİKROFON DURUMU İÇİN)
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'MIC_STATUS') {
                        activeMics[conn.peer] = data.state;
                        render();
                    }
                });
                conn.on('close', () => {
                    activeMics[conn.peer] = false;
                    render();
                });
            });
            
            peer.on('call', async (call) => {
                if (!myStream) {
                    try { 
                        myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                    } catch(e) { showToast("Mikrofon İzni Gerekli!", true); }
                }

                const clonedStream = myStream.clone();
                const pid = call.peer;
                
                let allowed = false;
                if(privateMicId === pid) allowed = true;
                else if(!privateMicId) {
                    if(tmMic && pid.includes('SDU_TEAM_')) allowed = true;
                    if(rfMic && pid.includes('SDU_REF_')) allowed = true;
                }
                if (clonedStream.getAudioTracks().length > 0) clonedStream.getAudioTracks()[0].enabled = allowed;

                call.answer(clonedStream);
                activeCalls[pid] = call;

                call.on('stream', (rs) => {
                    let a = document.getElementById('audio-'+call.peer);
                    if(!a) { 
                        a = document.createElement('audio'); 
                        a.id='audio-'+call.peer; 
                        a.autoplay=true; 
                        document.getElementById('audioPlayers').appendChild(a); 
                    }
                    a.srcObject = rs; 
                    updateAudioRouting();
                });

                call.on('close', () => { 
                    delete activeCalls[call.peer]; 
                    activeMics[call.peer] = false;
                    render();
                    const el = document.getElementById('audio-'+call.peer);
                    if(el) el.remove(); 
                });
                
                if (call.peerConnection) {
                    call.peerConnection.addEventListener('iceconnectionstatechange', () => {
                        const state = call.peerConnection.iceConnectionState;
                        if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                            call.close();
                            delete activeCalls[call.peer];
                            activeMics[call.peer] = false;
                            render();
                        }
                    });
                }
            });

            peer.on('error', (err) => { 
                isInitializing = false;
                console.error('PeerJS Hatası:', err.type, err); 
                
                if(err.type === 'unavailable-id' || err.type === 'id-taken') {
                    document.getElementById('connStatusText').innerText = "ID MEŞGUL! 15 Saniye İçinde Tekrar Denenecek...";
                    document.getElementById('connStatusText').style.color = "#ef4444";
                    if(voiceResetTimeout) clearTimeout(voiceResetTimeout);
                    voiceResetTimeout = setTimeout(() => { initVoice(); }, 15000);
                } else if(err.type === 'network' || err.type === 'server-error') {
                    if(voiceResetTimeout) clearTimeout(voiceResetTimeout);
                    voiceResetTimeout = setTimeout(() => { initVoice(); }, 5000);
                }
            });

            peer.on('disconnected', () => { 
                if (!peer.destroyed) peer.reconnect(); 
            });
        }

        function manualVoiceReset() {
            if(confirm("Ses sistemini zorla yeniden başlatmak istiyor musunuz? (Ghost ID'lerin düşmesi zaman alabilir)")) {
                document.getElementById('voiceResetIcon').classList.add('animate-spin');
                initVoice().finally(() => {
                    setTimeout(() => document.getElementById('voiceResetIcon').classList.remove('animate-spin'), 2000);
                });
            }
        }

        function startHeartbeat() {
            if (peer.heartbeatTimer) clearInterval(peer.heartbeatTimer);
            peer.heartbeatTimer = setInterval(() => { 
                if (peer && peer.socket && peer.socket._open) {
                    peer.socket.send({type: 'HEARTBEAT'}); 
                }
            }, 15000);
        }

        function updateAudioRouting() {
            document.querySelectorAll('#audioPlayers audio').forEach(a => {
                const id = a.id.replace('audio-','');
                a.muted = true;
                if(privateSpkId === id) a.muted = false;
                else if(!privateSpkId) {
                    if(id.includes('SDU_TEAM_') && tmSpk) a.muted = false;
                    if(id.includes('SDU_REF_') && rfSpk) a.muted = false;
                }
            });
        }

        async function updateMicRouting() {
            if(!myStream) { try { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) { return; } }

            Object.keys(activeCalls).forEach(pid => {
                const call = activeCalls[pid];
                if (call.peerConnection) {
                    const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                    if(sender && sender.track) {
                        let allowed = false;
                        if(privateMicId === pid) allowed = true;
                        else if(!privateMicId) {
                            if(tmMic && pid.includes('SDU_TEAM_')) allowed = true;
                            if(rfMic && pid.includes('SDU_REF_')) allowed = true;
                        }
                        sender.track.enabled = allowed;
                    }
                }
            });
            render();
        }

        function toggleTSpk() { tmSpk = !tmSpk; if(tmSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleTMic() { tmMic = !tmMic; if(tmMic) privateMicId=null; updateMicRouting(); upUI(); }
        function toggleRSpk() { rfSpk = !rfSpk; if(rfSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleRMic() { rfMic = !rfMic; if(rfMic) privateMicId=null; updateMicRouting(); upUI(); }
        function togglePriMic(id) { privateMicId = (privateMicId === id) ? null : id; if(privateMicId) { tmMic=false; rfMic=false; } updateMicRouting(); }
        function togglePriSpk(id) { privateSpkId = (privateSpkId === id) ? null : id; if(privateSpkId) { tmSpk=false; rfSpk=false; } updateAudioRouting(); render(); }
        
        function upUI() {
            document.getElementById('tmSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('tmMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${tmMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            document.getElementById('rfSpk').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfSpk?'spk-active shadow-lg shadow-blue-900/30':'glass text-slate-500'}`;
            document.getElementById('rfMic').className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase ${rfMic?'mic-active shadow-lg shadow-red-900/30':'glass text-slate-500'}`;
            lucide.createIcons();
        }

        async function addReferee() { const n=document.getElementById('newRefName').value, c=document.getElementById('newRefCode').value.toUpperCase(); if(n&&c) { await supabaseClient.from('referees').insert({name:n, code:c}); document.getElementById('newRefName').value=''; document.getElementById('newRefCode').value=''; fetchData(); showToast("Hakem Eklendi."); } }
        async function delRef(id) { if(confirm('Hakem silinsin mi?')) { await supabaseClient.from('referees').delete().eq('id',id); fetchData(); } }
        async function updateTeamCode(id, c) { await supabaseClient.from('registrations').update({team_code:c.toUpperCase()}).eq('id',id); fetchData(); showToast("Kod Güncellendi."); }
        async function timerCtrl(id, act) { 
            const t = teamsData.find(x=>x.id===id); let up = {};
            if(act==='start') up = { is_timer_running: true, timer_started_at: new Date().toISOString() };
            else if(act==='stop') up = { is_timer_running: false, elapsed_seconds: Number(t.elapsed_seconds||0) + Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000) };
            else if(act==='reset') { if(!confirm('Sıfırla?')) return; up = { is_timer_running: false, elapsed_seconds: 0, timer_started_at: null }; }
            await supabaseClient.from('registrations').update(up).eq('id',id); fetchData();
        }
        async function applyPenalty(id, m) { 
            const t = teamsData.find(x=>x.id===id); 
            const cur = Number(t.elapsed_seconds||0) + (t.is_timer_running ? Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000) : 0);
            await supabaseClient.from('registrations').update({elapsed_seconds: Math.max(0, cur + (m*60)), timer_started_at: t.is_timer_running ? new Date().toISOString() : null}).eq('id',id);
            fetchData();
        }

        function openTeamModal(id) {
            const t = teamsData.find(x => x.id === id);
            const tReports = reportsData.filter(r => r.team_id === id);
            let path = ""; if(t.path_history?.length) { path = "&path=color:0x3b82f6|weight:5"; t.path_history.slice(-25).forEach(p => path += `|${p.lat},${p.lng}`); }
            const map = t.last_lat ? `<iframe class="w-full h-80 rounded-[2rem] mb-6 shadow-2xl border-2 border-white/5" src="https://maps.google.com/maps?q=${t.last_lat},${t.last_lng}&z=17&output=embed${path}"></iframe>` : '<div class="p-10 text-center glass rounded-2xl mb-6 text-slate-500 uppercase font-black tracking-widest text-xs">KONUM VERİSİ YOK</div>';
            
            document.getElementById('modalBody').innerHTML = `<h2 class="text-3xl font-black mb-6 uppercase tracking-tighter text-left">${t.team_name}</h2>${map}
                <div class="grid md:grid-cols-2 gap-6 text-left">
                    <div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Hakem Raporları</h4>
                        ${tReports.map(r => `<div class="p-4 bg-white/5 rounded-2xl mb-2 flex justify-between items-center border border-white/5">
                            <div><span class="text-emerald-500 font-black text-[10px] uppercase tracking-widest">${r.referees?.name || 'Sistem'}</span><p class="text-xs mt-1 font-medium text-white">${r.notes||'Not yok.'}</p></div>
                            ${r.success ? '<i data-lucide="check-circle" class="text-emerald-500"></i>' : '<i data-lucide="x-circle" class="text-red-500"></i>'}
                        </div>`).join('') || '<p class="text-xs text-slate-600 italic text-left">Henüz rapor yok.</p>'}
                    </div>
                    <div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Takım Üyeleri</h4>
                        ${t.members.map(m => `<div class="p-3 glass rounded-xl mb-2 flex justify-between items-center text-white"><span>${m.name}</span><a href="tel:${m.phone}" class="text-emerald-500"><i data-lucide="phone" class="w-4 h-4"></i></a></div>`).join('')}
                    </div>
                </div>`;
            document.getElementById('teamModal').classList.remove('opacity-0', 'pointer-events-none');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('teamModal').classList.add('opacity-0', 'pointer-events-none'); }
        
        function openInfoModal(id) {
            const t = teamsData.find(x => x.id === id);
            let membersHtml = t.members.map((m, i) => `
                <div class="glass p-5 rounded-2xl mb-4 border-l-4 ${i === 0 ? 'border-red-500 bg-red-900/10' : 'border-blue-500 bg-blue-900/10'} shadow-lg">
                    <h4 class="font-black uppercase text-lg text-white mb-4">${i === 0 ? '<i data-lucide="crown" class="inline w-5 h-5 text-red-500 mr-2"></i>LİDER: ' : '<i data-lucide="user" class="inline w-5 h-5 text-blue-500 mr-2"></i>ÜYE: '} ${m.name || 'İsimsiz'}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-200">
                        <div><strong class="text-slate-500 uppercase text-[10px] tracking-widest block mb-1">E-Posta:</strong>${m.email || '-'}</div>
                        <div><strong class="text-slate-500 uppercase text-[10px] tracking-widest block mb-1">Telefon:</strong><a href="tel:${m.phone}" class="text-emerald-400 hover:underline font-bold">${m.phone || '-'}</a></div>
                        <div><strong class="text-slate-500 uppercase text-[10px] tracking-widest block mb-1">Sınıf:</strong>${m.class || '-'}</div>
                        <div><strong class="text-slate-500 uppercase text-[10px] tracking-widest block mb-1">Bölüm:</strong>${m.dept || '-'}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('infoModalBody').innerHTML = `
                <h2 class="text-3xl font-black mb-1 uppercase tracking-tighter text-left text-blue-400">KAYIT EVRAKLARI</h2>
                <h3 class="text-xl font-bold mb-8 uppercase text-slate-300">${t.team_name}</h3>
                <div class="space-y-4">
                    ${membersHtml}
                </div>
            `;
            document.getElementById('infoModal').classList.remove('opacity-0', 'pointer-events-none');
            lucide.createIcons();
        }

        function closeInfoModal() { document.getElementById('infoModal').classList.add('opacity-0', 'pointer-events-none'); }

        function formatTime(t) { let s = Number(t.elapsed_seconds || 0); if(t.is_timer_running && t.timer_started_at) s += Math.floor((Date.now() - new Date(t.timer_started_at).getTime())/1000); return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        function showToast(m, e) { const d = document.createElement('div'); d.className=`p-4 rounded-xl text-[10px] font-black uppercase tracking-widest glass border ${e?'border-red-500 text-red-500':'border-emerald-500 text-emerald-500'}`; d.innerText=m; document.getElementById('toastArea').appendChild(d); setTimeout(()=>d.remove(),3000); }

        setInterval(() => { teamsData.forEach(t => { if(t.is_timer_running) { const el = document.getElementById(`timer-${t.id}`); if(el) el.innerText = formatTime(t); } }); }, 1000);
        
        window.addEventListener('beforeunload', () => { 
            if(peer) {
                peer.disconnect();
                peer.destroy();
            }
        });
    </script>
</body>
</html>
