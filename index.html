<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn.active { border-bottom: 3px solid #ef4444; color: #ef4444; }
        .mic-active { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9b1c31; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toastArea" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-xs space-y-2"></div>
    <div id="audioPlayers" class="hidden"></div>

    <!-- TAKIM DETAY MODAL -->
    <div id="teamModal" class="fixed inset-0 z-[600] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none p-4 transition-opacity">
        <div class="glass w-full max-w-2xl rounded-[2.5rem] p-8 relative border-t-4 border-red-700 text-white shadow-3xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-2 glass rounded-full hover:text-red-500"><i data-lucide="x"></i></button>
            <div id="modalBody" class="max-h-[80vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex justify-between items-center glass p-6 rounded-3xl">
            <div class="flex items-center gap-4">
                <div class="p-4 bg-red-700 rounded-2xl"><i data-lucide="shield-check" class="text-white"></i></div>
                <div><h1 class="text-xl font-black uppercase">SDÜ <span class="text-red-600">KOMUTA</span></h1><p class="text-[9px] text-slate-500 uppercase tracking-widest">Saha Kontrol Merkezi</p></div>
            </div>
            <div class="flex bg-black/20 p-1 rounded-xl">
                <button onclick="switchTab('teams')" id="tabTeams" class="tab-btn active px-6 py-2 text-[10px] font-black uppercase">Yarışmacılar</button>
                <button onclick="switchTab('refs')" id="tabRefs" class="tab-btn px-6 py-2 text-[10px] font-black uppercase">Hakemler</button>
            </div>
        </header>

        <!-- 4 KANAL TELSİZ PANELİ -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl border-l-4 border-red-600">
                <p class="text-[9px] font-black text-slate-500 uppercase mb-4">Yarışmacı Genel</p>
                <div class="flex gap-2">
                    <button id="tmSpk" onclick="toggleTSpk()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="volume-x" class="w-4 h-4 mx-auto mb-1"></i>Duy</button>
                    <button id="tmMic" onclick="toggleTMic()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="mic-off" class="w-4 h-4 mx-auto mb-1"></i>Anons</button>
                </div>
            </div>
            <div class="glass p-6 rounded-3xl border-l-4 border-emerald-600">
                <p class="text-[9px] font-black text-slate-500 uppercase mb-4">Hakem Genel</p>
                <div class="flex gap-2">
                    <button id="rfSpk" onclick="toggleRSpk()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="volume-x" class="w-4 h-4 mx-auto mb-1"></i>Duy</button>
                    <button id="rfMic" onclick="toggleRMic()" class="flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase"><i data-lucide="mic-off" class="w-4 h-4 mx-auto mb-1"></i>Anons</button>
                </div>
            </div>
        </div>

        <div id="panelTeams" class="glass rounded-[2rem] overflow-hidden">
            <table class="w-full text-left text-white">
                <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400">
                    <tr><th class="px-6 py-5">Takım</th><th class="px-6 py-5 text-center">Süre</th><th class="px-6 py-5 text-center">Ceza</th><th class="px-6 py-5 text-center">Özel Ses</th><th class="px-6 py-5 text-right">Durum</th></tr>
                </thead>
                <tbody id="teamsBody" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <div id="panelRefs" class="hidden space-y-4">
            <div class="glass p-6 rounded-3xl flex justify-between items-center gap-4">
                <input type="text" id="refN" placeholder="Hakem Adı" class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs flex-1">
                <input type="text" id="refC" placeholder="Kod" class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs w-24">
                <button onclick="addRef()" class="px-6 py-2 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase">Ekle</button>
            </div>
            <div class="glass rounded-[2rem] overflow-hidden">
                <table class="w-full text-left text-white">
                    <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400">
                        <tr><th class="px-6 py-5">Hakem</th><th class="px-6 py-5">Kod</th><th class="px-6 py-5 text-center">Özel Ses</th><th class="px-6 py-5 text-right">Konum</th><th class="px-6 py-5">Sil</th></tr>
                    </thead>
                    <tbody id="refsBody" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let teamsData = [], refsData = [], reportsData = [], peer = null, myStream = null;
        let activeCalls = {}, privateMicId = null, privateSpkId = null;
        let tmSpk = false, tmMic = false, rfSpk = false, rfMic = false;

        async function fetchData() {
            const { data: t } = await supabaseClient.from('registrations').select('*').order('team_name');
            const { data: r } = await supabaseClient.from('referees').select('*').order('name');
            const { data: rp } = await supabaseClient.from('referee_reports').select('*, referees(name)');
            teamsData = t || []; refsData = r || []; reportsData = rp || []; render();
        }

        function switchTab(t) {
            document.getElementById('panelTeams').classList.toggle('hidden', t !== 'teams');
            document.getElementById('panelRefs').classList.toggle('hidden', t !== 'refs');
            document.getElementById('tabTeams').classList.toggle('active', t === 'teams');
            document.getElementById('tabRefs').classList.toggle('active', t === 'refs');
        }

        function render() {
            document.getElementById('teamsBody').innerHTML = teamsData.map(t => {
                const pid = 'SDU_TEAM_' + t.id.substring(0,8);
                return `<tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4">
                        <button onclick="openTeam('${t.id}')" class="font-bold uppercase text-white hover:text-red-500">${t.team_name}</button>
                        <input type="text" class="block bg-transparent border-none p-0 text-[10px] text-red-500 font-mono outline-none" value="${t.team_code||''}" onchange="updateCode('${t.id}',this.value)">
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="timerCtrl('${t.id}','${t.is_timer_running?'stop':'start'}')" class="p-2 rounded-lg ${t.is_timer_running?'bg-red-500/20 text-red-500':'bg-emerald-500/20 text-emerald-500'}"><i data-lucide="${t.is_timer_running?'pause':'play'}" class="w-4 h-4"></i></button>
                            <button onclick="timerCtrl('${t.id}','reset')" class="p-2 rounded-lg bg-slate-800 text-slate-500"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                            <span class="text-xs font-black mono w-16" id="timer-${t.id}">${formatTime(t)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center"><div class="flex gap-1 justify-center"><button onclick="penalty('${t.id}',5)" class="p-1 text-[10px] glass rounded">+5</button><button onclick="penalty('${t.id}',-5)" class="p-1 text-[10px] glass rounded">-5</button></div></td>
                    <td class="px-6 py-4 text-center"><div class="flex gap-2 justify-center"><button onclick="togglePriSpk('${pid}')" class="p-2 glass rounded-lg ${privateSpkId===pid?'bg-blue-600 text-white':'text-slate-500'}"><i data-lucide="volume-2" class="w-4 h-4"></i></button><button onclick="togglePriMic('${pid}')" class="p-2 glass rounded-lg ${privateMicId===pid?'bg-red-600 text-white':'text-slate-500'}"><i data-lucide="mic" class="w-4 h-4"></i></button></div></td>
                    <td class="px-6 py-4 text-right">${t.last_lat ? '<span class="text-emerald-500 text-[9px] font-black animate-pulse">● CANLI</span>' : '<span class="text-slate-700 text-[9px]">Sinyal Yok</span>'}</td>
                </tr>`}).join('');

            document.getElementById('refsBody').innerHTML = refsData.map(r => {
                const pid = 'SDU_REF_' + r.id.substring(0,8);
                return `<tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4 font-bold text-white uppercase">${r.name}</td>
                    <td class="px-6 py-4 font-mono text-emerald-500 font-bold uppercase">${r.code}</td>
                    <td class="px-6 py-4 text-center"><div class="flex gap-2 justify-center"><button onclick="togglePriSpk('${pid}')" class="p-2 glass rounded-lg ${privateSpkId===pid?'bg-blue-600 text-white':'text-slate-500'}"><i data-lucide="volume-2" class="w-4 h-4"></i></button><button onclick="togglePriMic('${pid}')" class="p-2 glass rounded-lg ${privateMicId===pid?'bg-red-600 text-white':'text-slate-500'}"><i data-lucide="mic" class="w-4 h-4"></i></button></div></td>
                    <td class="px-6 py-4 text-right">${r.last_lat ? '<span class="text-emerald-500 animate-pulse">●</span>' : '●'}</td>
                    <td class="px-6 py-4"><button onclick="delRef('${r.id}')" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>`}).join('');
            lucide.createIcons();
        }

        // SES / TELSİZ MANTIĞI
        function initVoice() {
            peer = new Peer('SDU_ADMIN_2026_VOICE');
            peer.on('call', async (call) => {
                if (!myStream) { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); myStream.getAudioTracks()[0].enabled = false; }
                call.answer(myStream); activeCalls[call.peer] = call;
                call.on('stream', (rs) => {
                    let a = document.getElementById('audio-'+call.peer);
                    if(!a) { a = document.createElement('audio'); a.id='audio-'+call.peer; a.autoplay=true; document.getElementById('audioPlayers').appendChild(a); }
                    a.srcObject = rs; updateAudioRouting();
                });
            });
        }
        function updateAudioRouting() {
            document.querySelectorAll('#audioPlayers audio').forEach(a => {
                const id = a.id.replace('audio-','');
                a.muted = true;
                if(privateSpkId === id) a.muted = false;
                else if(privateSpkId === null) {
                    if(id.includes('SDU_TEAM_') && tmSpk) a.muted = false;
                    if(id.includes('SDU_REF_') && rfSpk) a.muted = false;
                }
            });
        }
        async function updateMicRouting() {
            if(!myStream) { try { myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) { return; } }
            myStream.getAudioTracks()[0].enabled = (tmMic || rfMic || privateMicId !== null);
            Object.keys(activeCalls).forEach(pid => {
                const s = activeCalls[pid].peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                if(s) {
                    let allowed = false;
                    if(privateMicId === pid) allowed = true;
                    else if(privateMicId === null) {
                        if(tmMic && pid.includes('SDU_TEAM_')) allowed = true;
                        if(rfMic && pid.includes('SDU_REF_')) allowed = true;
                    }
                    s.track.enabled = allowed;
                }
            });
            render();
        }
        function toggleTSpk() { tmSpk = !tmSpk; if(tmSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleTMic() { tmMic = !tmMic; if(tmMic) privateMicId=null; updateMicRouting(); upUI(); }
        function toggleRSpk() { rfSpk = !rfSpk; if(rfSpk) privateSpkId=null; updateAudioRouting(); upUI(); }
        function toggleRMic() { rfMic = !rfMic; if(rfMic) privateMicId=null; updateMicRouting(); upUI(); }
        function togglePriMic(id) { privateMicId = (privateMicId === id) ? null : id; updateMicRouting(); }
        function togglePriSpk(id) { privateSpkId = (privateSpkId === id) ? null : id; updateAudioRouting(); render(); }
        function upUI() {
            document.getElementById('tmSpk').className = tmSpk ? "flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-bold uppercase spk-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('tmMic').className = tmMic ? "flex-1 py-3 bg-red-600 text-white rounded-xl text-[10px] font-bold uppercase mic-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('rfSpk').className = rfSpk ? "flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-bold uppercase spk-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            document.getElementById('rfMic').className = rfMic ? "flex-1 py-3 bg-red-600 text-white rounded-xl text-[10px] font-bold uppercase mic-active" : "flex-1 py-3 glass rounded-xl text-[10px] font-bold uppercase";
            lucide.createIcons();
        }

        // YÖNETİM
        async function addRef() { const n = document.getElementById('refN').value, c = document.getElementById('refC').value.toUpperCase(); if(n&&c) { await supabaseClient.from('referees').insert({name:n, code:c}); fetchData(); } }
        async function delRef(id) { if(confirm('Hakem silinsin mi?')) { await supabaseClient.from('referees').delete().eq('id',id); fetchData(); } }
        async function updateCode(id, c) { await supabaseClient.from('registrations').update({team_code:c.toUpperCase()}).eq('id',id); fetchData(); }
        async function timerCtrl(id, act) { 
            const t = teamsData.find(x=>x.id===id); let up = {};
            if(act==='start') up = { is_timer_running: true, timer_started_at: new Date().toISOString() };
            else if(act==='stop') up = { is_timer_running: false, elapsed_seconds: Number(t.elapsed_seconds||0) + Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000) };
            else if(act==='reset') { if(!confirm('Sıfırla?')) return; up = { is_timer_running: false, elapsed_seconds: 0, timer_started_at: null }; }
            await supabaseClient.from('registrations').update(up).eq('id',id); fetchData();
        }
        async function penalty(id, m) { 
            const t = teamsData.find(x=>x.id===id); 
            const cur = Number(t.elapsed_seconds||0) + (t.is_timer_running ? Math.floor((Date.now()-new Date(t.timer_started_at).getTime())/1000) : 0);
            await supabaseClient.from('registrations').update({elapsed_seconds: cur + (m*60), timer_started_at: t.is_timer_running ? new Date().toISOString() : null}).eq('id',id);
            fetchData();
        }

        function openTeam(id) {
            const t = teamsData.find(x => x.id === id);
            const teamReports = reportsData.filter(r => r.team_id === id);
            let map = t.last_lat ? `<iframe class="w-full h-64 rounded-3xl mb-6 shadow-2xl" src="https://maps.google.com/maps?q=${t.last_lat},${t.last_lng}&z=17&output=embed"></iframe>` : '';
            let reportsHtml = teamReports.map(r => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl mb-2 flex justify-between items-center">
                    <div><span class="text-emerald-500 font-bold text-[10px] uppercase tracking-widest">${r.referees?.name}</span><p class="text-xs text-white mt-1">${r.notes || 'Not yok.'}</p></div>
                    <div class="flex gap-2">${r.success ? '<span class="text-emerald-500 text-[10px] font-black">BAŞARILI</span>' : '<span class="text-red-500 text-[10px] font-black">BAŞARISIZ</span>'}</div>
                </div>`).join('');
            
            document.getElementById('modalBody').innerHTML = `<h2 class="text-2xl font-black mb-6 uppercase">${t.team_name}</h2>${map}
                <div class="space-y-6">
                    <div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Hakem Raporları</h4>${reportsHtml || '<p class="text-xs text-slate-600">Henüz rapor girilmemiş.</p>'}</div>
                    <div><h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Ekip Üyeleri</h4>${t.members.map(m => `<div class="text-xs p-2 glass rounded-lg mb-1">${m.name} - ${m.phone}</div>`).join('')}</div>
                </div>`;
            document.getElementById('teamModal').classList.remove('opacity-0', 'pointer-events-none');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('teamModal').classList.add('opacity-0', 'pointer-events-none'); }
        function formatTime(t) { let s = Number(t.elapsed_seconds || 0); if(t.is_timer_running) s += Math.floor((Date.now() - new Date(t.timer_started_at).getTime())/1000); return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

        window.onload = () => { fetchData(); initVoice(); supabaseClient.channel('adm_sync').on('postgres_changes', {event:'*', schema:'public', table:'registrations'}, fetchData).subscribe(); };
        setInterval(() => { teamsData.forEach(t => { if(t.is_timer_running) { const el = document.getElementById(`timer-${t.id}`); if(el) el.innerText = formatTime(t); } }); }, 1000);
    </script>
</body>
</html>
